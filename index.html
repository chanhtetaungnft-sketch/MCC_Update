            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;

            padding: 25px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

            text-align: center;

        }

            padding: 15px;

            border: 2px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #f1f5f9;
            color: #475569;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        .mcc-tag {
            font-weight: bold;
            color: var(--accent);
            background: #eff6ff;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .rate {
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 5px;
            display: inline-block;
        }
        .std-rate { background: #dcfce7; color: #166534; }
        .hod-rate { background: #fee2e2; color: #991b1b; }
        .cs-rate { background: #fef9c3; color: #854d0e; }

        tr:hover { background: #f8fafc; }
    </style>
</head>

    const formatPercent = (val) => {
        if (val === 0) return "0%";
        return (val * 100).toFixed(2).replace(/\.00$/, '') + "%";
    };

    function displayData(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.forEach(item => {
            const tr = `<tr>
                <td><span class="mcc-tag">${item.c}</span></td>
                <td>
                    <strong>${item.n}</strong><br>
                    <small style="color:#64748b">${item.add}</small>
                    <div style="font-size:12px; color:#94a3b8; margin-top:4px;">Type: ${item.type}</div>
                </td>
                <td><span class="rate std-rate">${formatPercent(item.s)}</span></td>
                <td><span class="rate hod-rate">${item.h === 0 ? '-' : formatPercent(item.h)}</span></td>
                <td><span class="rate cs-rate">${formatPercent(item.cs)}</span></td>
            </tr>`;
            tbody.innerHTML += tr;
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = rawData.filter(i => 
            i.c.includes(term) || 
            i.n.toLowerCase().includes(term) || 
            i.add.toLowerCase().includes(term) ||
            i.type.toLowerCase().includes(term)
        );
        displayData(filtered);
    });

    displayData(rawData);
</script>
